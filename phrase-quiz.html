<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英会話フレーズ問題集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:20px 24px;text-align:center}
header h1{font-size:1.8rem;font-weight:700;letter-spacing:.05em}
header p{font-size:.9rem;color:#94a3b8;margin-top:4px}

.progress-bar-wrap{background:#1e293b;padding:8px 24px;display:flex;align-items:center;gap:12px}
.progress-bar-wrap span{color:#94a3b8;font-size:.8rem;white-space:nowrap}
.progress-bar{flex:1;height:8px;background:#334155;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:4px;transition:width .5s}
.progress-label{color:#cbd5e1;font-size:.8rem;white-space:nowrap}

.nav-tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:3px solid #e2e8f0;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:120px;padding:14px 8px;text-align:center;cursor:pointer;font-size:.8rem;font-weight:600;border:none;background:none;transition:all .2s;border-bottom:4px solid transparent;color:#64748b;white-space:nowrap}
.nav-tab:hover{background:#f8fafc}
.nav-tab.active{color:#fff;border-bottom-color:transparent}
.nav-tab[data-sec="s1"].active{background:#3b82f6}
.nav-tab[data-sec="s2"].active{background:#10b981}
.nav-tab[data-sec="s3"].active{background:#8b5cf6}
.nav-tab[data-sec="s4"].active{background:#f59e0b}
.nav-tab[data-sec="review"].active{background:#ef4444}
.nav-tab[data-sec="shuffle"].active{background:#6366f1}

/* Shuffle mode */
.shuffle-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.shuffle-meta{display:flex;flex-direction:column;gap:4px}
.shuffle-count-label{font-size:1rem;font-weight:700;color:#6366f1}
.shuffle-progress-label{font-size:.85rem;color:#64748b}
.shuffle-all-btn{padding:10px 22px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:.9rem;font-weight:700;transition:all .2s;letter-spacing:.03em}
.shuffle-all-btn:hover{background:#4f46e5}
.shuffle-item{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #6366f1}
.shuffle-item.si-correct{border-left-color:#10b981}
.shuffle-item.si-wrong{border-left-color:#ef4444}
.shuffle-phrase-tag{font-size:.72rem;color:#6366f1;font-weight:700;margin-bottom:5px;letter-spacing:.04em}
.shuffle-q-num{font-size:.72rem;color:#94a3b8;margin-bottom:6px}
.shuffle-jp{font-size:1rem;font-weight:600;margin-bottom:12px;line-height:1.6;color:#1e293b}

.wrong-badge{display:inline-block;background:#ef4444;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.7rem;text-align:center;line-height:18px;margin-left:4px;font-weight:700;vertical-align:middle}

.topic-section{display:none;padding:24px;max-width:1400px;margin:0 auto}
.topic-section.active{display:block}

.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.badge{font-size:.7rem;padding:3px 8px;border-radius:20px;color:#fff;font-weight:600}
.badge-s1{background:#3b82f6}
.badge-s2{background:#10b981}
.badge-s3{background:#8b5cf6}
.badge-s4{background:#f59e0b}

.phrase-header{background:#f8fafc;border-left:4px solid #3b82f6;border-radius:0 8px 8px 0;padding:10px 16px;margin-bottom:16px;font-weight:700;color:#1e293b;font-size:1rem}
.phrase-header.s2{border-left-color:#10b981}
.phrase-header.s3{border-left-color:#8b5cf6}
.phrase-header.s4{border-left-color:#f59e0b}

.quiz-question{background:#f8fafc;border-radius:10px;margin-bottom:12px;overflow:hidden}
.quiz-question p{font-size:.95rem;margin-bottom:10px;font-weight:500;line-height:1.6}
.q-num{font-size:.75rem;color:#94a3b8;font-weight:600;margin-bottom:4px}

/* 左右2カラム分割 */
.q-split{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch}
.q-left{padding:16px;border-right:2px solid #e2e8f0}
.q-right{padding:16px 16px 16px 20px;background:#f8fafc;display:flex;flex-direction:column;justify-content:center;min-height:90px}
.q-right-hint{flex:1;display:flex;align-items:center;justify-content:center;color:#cbd5e1;font-size:.8rem;gap:6px;padding:16px 0;text-align:center;line-height:1.6}
.q-left .fill-input{width:100%;max-width:none}
.q-left .trans-input{width:100%;max-width:none}

.quiz-choices{display:flex;flex-wrap:wrap;gap:8px}
.choice-btn{padding:8px 16px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s}
.choice-btn:hover:not(:disabled){border-color:#94a3b8}
.choice-btn.correct{background:#dcfce7;border-color:#10b981;color:#065f46}
.choice-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.choice-btn:disabled{cursor:not-allowed}

.quiz-feedback{font-size:.85rem;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.ok{background:#dcfce7;color:#065f46}
.quiz-feedback.ng{background:#fee2e2;color:#991b1b}

.fill-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.fill-input{padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:.9rem;font-family:'Noto Sans JP',sans-serif;width:240px;transition:border-color .2s}
.fill-input:focus{outline:none;border-color:#3b82f6}
.fill-input.correct{border-color:#10b981;background:#f0fdf4}
.fill-input.wrong{border-color:#ef4444;background:#fef2f2}
.check-btn{padding:8px 16px;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.check-btn:hover{background:#2563eb}

.trans-show-btn{padding:8px 16px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s}
.trans-show-btn:hover{background:#f1f5f9}
.trans-answer{display:none;margin-top:10px;padding:10px 14px;background:#dcfce7;border-radius:8px;color:#065f46;font-weight:500}
.trans-answer.show{display:block}

.score-display{text-align:center;padding:12px;background:#f0f9ff;border-radius:10px;margin-bottom:16px;font-size:.9rem;color:#1e40af;font-weight:600}

/* Review mode - persistent bottom section */
.review-wrap{background:#fff7f7;border-top:4px solid #ef4444;padding:32px 24px;margin-top:8px}
.review-inner{max-width:960px;margin:0 auto}
.review-title-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.review-title-left{display:flex;align-items:center;gap:10px}
.review-heading{font-size:1.2rem;font-weight:700;color:#1e293b}
.review-count-badge{background:#ef4444;color:#fff;border-radius:12px;padding:2px 12px;font-size:.8rem;font-weight:700}
.shuffle-btn{padding:10px 20px;border-radius:8px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.shuffle-btn:hover{background:#dc2626}
.review-placeholder{text-align:center;padding:36px;background:#fff;border-radius:12px;border:2px dashed #fca5a5;color:#94a3b8}
.review-placeholder p{font-size:.95rem;margin-bottom:4px}
.review-item{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(239,68,68,.12);border-left:4px solid #ef4444;transition:opacity .5s}
.review-item.cleared{opacity:.35;pointer-events:none;border-left-color:#10b981}
.review-bonus{border-left-color:#8b5cf6}
.trans-input{width:100%;max-width:440px}

/* Grammar explanation box */
.grammar-explain{margin-top:0}
.q-right .quiz-feedback{margin-top:0;margin-bottom:8px}
.grammar-box{padding:14px 16px;background:linear-gradient(135deg,#eff6ff,#f0fdf4);border-radius:10px;border:1px solid #bfdbfe;border-left:4px solid #3b82f6}
.grammar-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.grammar-type-badge{display:inline-block;background:#1d4ed8;color:#fff;font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:12px;letter-spacing:.05em;white-space:nowrap}
.grammar-type-name{font-size:.88rem;font-weight:700;color:#1e40af}
.grammar-phrase{font-size:.88rem;font-weight:700;color:#0f172a;padding:6px 10px;background:#dbeafe;border-radius:6px;margin-bottom:8px;line-height:1.5}
.grammar-detail-text{font-size:.85rem;color:#1e3a5f;line-height:1.75;border-top:1px solid #bfdbfe;padding-top:8px;margin-top:6px}

@media(max-width:900px){
.q-split{grid-template-columns:1fr}
.q-left{border-right:none;border-bottom:2px solid #e2e8f0}
.q-right{border-radius:0 0 10px 10px}
.q-right-hint{padding:10px 0}
}
@media(max-width:600px){
.nav-tab{font-size:.7rem;padding:12px 6px;min-width:80px}
header h1{font-size:1.3rem}
.topic-section{padding:12px}
.card{padding:16px}
.fill-input{width:100%}
}
</style>
</head>
<body>
<header>
  <h1>英会話フレーズ問題集</h1>
  <p>動画フレーズ練習 - 99フレーズ × 3問 = 297問</p>
</header>

<div class="progress-bar-wrap">
  <span>進捗:</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-label" id="progressLabel">0 / 0 正解</span>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" data-sec="s1" onclick="showSec('s1',this)">基本フレーズ①</button>
  <button class="nav-tab" data-sec="s2" onclick="showSec('s2',this)">疑問文</button>
  <button class="nav-tab" data-sec="s3" onclick="showSec('s3',this)">応用フレーズ②</button>
  <button class="nav-tab" data-sec="s4" onclick="showSec('s4',this)">丁寧な表現</button>
  <button class="nav-tab" data-sec="shuffle" onclick="showSec('shuffle',this)">🔀 シャッフルモード</button>
</div>

<div id="section-s1" class="topic-section active"></div>
<div id="section-s2" class="topic-section"></div>
<div id="section-s3" class="topic-section"></div>
<div id="section-s4" class="topic-section"></div>
<div id="section-shuffle" class="topic-section"></div>
<!-- 苦手問題リスト：常に表示される復習枠 -->
<div class="review-wrap">
  <div class="review-inner">
    <div class="review-title-bar">
      <div class="review-title-left">
        <span style="font-size:1.4rem">🔴</span>
        <h2 class="review-heading">苦手問題リスト</h2>
        <span class="review-count-badge" id="review-count-badge" style="display:none">0問</span>
      </div>
      <button class="shuffle-btn" id="shuffle-btn" onclick="shuffleReview()" style="display:none">🔀 シャッフルしてやり直す</button>
    </div>
    <div id="review-list">
      <div class="review-placeholder" id="review-placeholder">
        <p>✏️ 不正解になった問題がここに自動追加されます</p>
        <p>繰り返し練習して苦手を克服しましょう！</p>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== QUIZ DATA =====================
const quizData = {
  s1: {
    title: '基本フレーズ①',
    badge: 'badge-s1',
    phraseClass: '',
    phrases: [
      { phrase: 'I wanna', jp: '〜したい（カジュアル）', qs: [
        { type:'mc', q:'「映画を見たい」→ I _____ watch a movie.', choices:['wanna','gonna','used to','have to'], ans:0, ok:'wanna は "want to" のカジュアルな言い方です' },
        { type:'fill', q:'「もっと知りたい」→ フレーズを使って: _____ know more.', ans:'I wanna', ok:'I wanna know more.' },
        { type:'trans', jp:'あなたに会いたい', en:'I wanna see you.' }
      ]},
      { phrase: 'Let me', jp: '〜させてください', qs: [
        { type:'mc', q:'「確認させて」→ _____ check.', choices:['Let me','Make me','Give me','Help me'], ans:0, ok:'Let me ＋ 動詞の原形 で「〜させて」' },
        { type:'fill', q:'「試させてください」→ フレーズを使って: _____ try.', ans:'Let me', ok:'Let me try.' },
        { type:'trans', jp:'試させてください', en:'Let me try.' }
      ]},
      { phrase: 'Thank you for', jp: '〜してくれてありがとう', qs: [
        { type:'mc', q:'「来てくれてありがとう」→ Thank you _____ coming.', choices:['for','to','of','about'], ans:0, ok:'Thank you for ＋ 動名詞（〜ing）' },
        { type:'fill', q:'「助けてくれてありがとう」→ フレーズを使って: _____ your help.', ans:'Thank you for', ok:'Thank you for your help.' },
        { type:'trans', jp:'招待してくれてありがとう', en:'Thank you for inviting me.' }
      ]},
      { phrase: "Don't be", jp: '〜にならないで', qs: [
        { type:'mc', q:'「心配しないで」→ Don\'t be _____.', choices:['worried','worry','worrying','worries'], ans:0, ok:"Don't be + 形容詞" },
        { type:'fill', q:'「恥ずかしがらないで」→ フレーズを使って: _____ shy.', ans:"Don't be", ok:"Don't be shy." },
        { type:'trans', jp:'遅れないで', en:"Don't be late." }
      ]},
      { phrase: "Don't forget", jp: '〜するのを忘れないで', qs: [
        { type:'mc', q:'「ドアを閉めるのを忘れないで」→ Don\'t forget _____ the door.', choices:['to close','closing','close','closed'], ans:0, ok:"Don't forget to + 動詞の原形" },
        { type:'fill', q:'「傘を持っていくのを忘れないで」→ フレーズを使って: _____ your umbrella.', ans:"Don't forget to bring", ok:"Don't forget to bring your umbrella." },
        { type:'trans', jp:'私に電話するのを忘れないで', en:"Don't forget to call me." }
      ]},
      { phrase: 'There is', jp: '〜がある / いる', qs: [
        { type:'mc', q:'「テーブルの上に本がある」→ There _____ a book on the table.', choices:['is','are','be','has'], ans:0, ok:'単数には There is、複数には There are' },
        { type:'fill', q:'「近くにコンビニがある」→ フレーズを使って: _____ a convenience store nearby.', ans:'There is', ok:'There is a convenience store nearby.' },
        { type:'trans', jp:'公園に犬がいる', en:'There is a dog in the park.' }
      ]},
      { phrase: "I'm happy to", jp: '喜んで〜します', qs: [
        { type:'mc', q:'「喜んでお手伝いします」→ I\'m happy _____ help you.', choices:['to','for','about','at'], ans:0, ok:"I'm happy to + 動詞の原形" },
        { type:'fill', q:'「喜んで参加します」→ フレーズを使って: _____ join you.', ans:"I'm happy to", ok:"I'm happy to join you." },
        { type:'trans', jp:'またお会いできて嬉しいです', en:"I'm happy to see you again." }
      ]},
      { phrase: "I'm gonna", jp: '〜するつもり（カジュアル）', qs: [
        { type:'mc', q:'「映画を見に行くつもり」→ I\'m gonna _____ a movie.', choices:['watch','watching','watched','watches'], ans:0, ok:"I'm gonna = I'm going to のカジュアル表現" },
        { type:'fill', q:'「もう寝るつもり」→ フレーズを使って: _____ go to bed.', ans:"I'm gonna", ok:"I'm gonna go to bed." },
        { type:'trans', jp:'買い物に行くつもり', en:"I'm gonna go shopping." }
      ]},
      { phrase: 'That sounds', jp: '〜そうですね', qs: [
        { type:'mc', q:'「楽しそうですね」→ That sounds _____.', choices:['fun','funnily','funnier','funniest'], ans:0, ok:'That sounds + 形容詞' },
        { type:'fill', q:'「良さそうですね」→ フレーズを使って: _____ good.', ans:'That sounds', ok:'That sounds good.' },
        { type:'trans', jp:'面白そうですね', en:'That sounds interesting.' }
      ]},
      { phrase: "I'd like to", jp: '〜したいのですが（丁寧）', qs: [
        { type:'mc', q:'「予約したいのですが」→ I\'d like to _____ a reservation.', choices:['make','making','made','makes'], ans:0, ok:"I'd like to = I want to の丁寧な言い方" },
        { type:'fill', q:'「もっと詳しく知りたいのですが」→ フレーズを使って: _____ know more about it.', ans:"I'd like to", ok:"I'd like to know more about it." },
        { type:'trans', jp:'コーヒーを一杯いただきたいのですが', en:"I'd like to have a cup of coffee." }
      ]},
      { phrase: 'I enjoyed', jp: '〜を楽しみました', qs: [
        { type:'mc', q:'「あなたと話すのを楽しみました」→ I enjoyed _____ with you.', choices:['talking','talk','talked','to talk'], ans:0, ok:'enjoyed + 動名詞（〜ing）' },
        { type:'fill', q:'「パーティーを楽しみました」→ フレーズを使って: _____ the party.', ans:'I enjoyed', ok:'I enjoyed the party.' },
        { type:'trans', jp:'映画を楽しみました', en:'I enjoyed the movie.' }
      ]},
      { phrase: "I'm ready", jp: '準備ができています', qs: [
        { type:'mc', q:'「出発する準備ができています」→ I\'m ready _____ go.', choices:['to','for','about','at'], ans:0, ok:"I'm ready to + 動詞の原形、I'm ready for + 名詞" },
        { type:'fill', q:'「始める準備ができています」→ フレーズを使って: _____ start.', ans:"I'm ready to", ok:"I'm ready to start." },
        { type:'trans', jp:'テストの準備ができています', en:"I'm ready for the test." }
      ]},
      { phrase: 'I wonder', jp: '〜かな / 〜だろうか', qs: [
        { type:'mc', q:'「明日雨が降るかな」→ I wonder _____ it will rain tomorrow.', choices:['if','that','what','which'], ans:0, ok:'I wonder if … で「〜かどうかな」' },
        { type:'fill', q:'「彼女はなぜ遅いのかな」→ フレーズを使って: _____ she is late.', ans:'I wonder why', ok:'I wonder why she is late.' },
        { type:'trans', jp:'彼は何をしているのかな', en:"I wonder what he's doing." }
      ]},
      { phrase: 'I mean', jp: 'つまり / 〜が言いたいのは', qs: [
        { type:'mc', q:'「つまり、もっと練習が必要だということ」→ I mean, you need more _____.', choices:['practice','practicing','practiced','practices'], ans:0, ok:'I mean は発言を言い直したり補足するときに使う' },
        { type:'fill', q:'「つまり、それは本当じゃないってこと」→ フレーズを使って: _____ it\'s not true.', ans:"I mean,", ok:"I mean, it's not true." },
        { type:'trans', jp:'つまり、私はあなたを信頼しているということ', en:"I mean, I trust you." }
      ]},
      { phrase: 'I forgot to', jp: '〜するのを忘れた', qs: [
        { type:'mc', q:'「宿題をするのを忘れた」→ I forgot to do my _____.', choices:['homework','homeplay','homeworks','schoolwork'], ans:0, ok:'I forgot to + 動詞の原形' },
        { type:'fill', q:'「財布を持ってくるのを忘れた」→ フレーズを使って: _____ bring my wallet.', ans:'I forgot to', ok:'I forgot to bring my wallet.' },
        { type:'trans', jp:'ドアを閉めるのを忘れた', en:'I forgot to close the door.' }
      ]},
      { phrase: 'It was nice', jp: '〜は良かったです', qs: [
        { type:'mc', q:'「あなたに会えて良かったです」→ It was nice _____ you.', choices:['meeting','to meeting','meet','met'], ans:0, ok:'It was nice meeting you. / It was nice to meet you. どちらも可' },
        { type:'fill', q:'「あなたと話せて良かったです」→ フレーズを使って: _____ with you.', ans:'It was nice talking', ok:'It was nice talking with you.' },
        { type:'trans', jp:'あなたと一緒に過ごせて良かったです', en:'It was nice spending time with you.' }
      ]},
      { phrase: 'See you', jp: 'またね / さようなら', qs: [
        { type:'mc', q:'「また明日ね」→ See you _____.', choices:['tomorrow','yesterday','today','now'], ans:0, ok:'See you + 時を表す言葉' },
        { type:'fill', q:'「また後でね」→ フレーズを使って: _____ later.', ans:'See you', ok:'See you later.' },
        { type:'trans', jp:'また来週ね', en:'See you next week.' }
      ]},
      { phrase: 'It seems', jp: '〜のようです', qs: [
        { type:'mc', q:'「彼は疲れているようです」→ It seems he is _____.', choices:['tired','tiring','tiredly','tiresome'], ans:0, ok:'It seems (like) + 文 / It seems + 形容詞' },
        { type:'fill', q:'「彼女は怒っているようです」→ フレーズを使って: _____ she is angry.', ans:'It seems', ok:'It seems she is angry.' },
        { type:'trans', jp:'雨が降りそうです', en:"It seems like it's going to rain." }
      ]},

  const phrase = quizData[secId].phrases[pIdx];
  let bonusAdded = 0;
  phrase.qs.forEach((bq, qi) => {
    if (bonusAdded >= 2 || qi === qIdx) return;
    const bKey = `bonus-${secId}-${pIdx}-${qi}`;
    if (wrongList.find(w => w.key === bKey)) return;
    wrongList.push({secId, pIdx, qIdx: qi, key: bKey, isBonus: true});
    renderReviewItem(secId, pIdx, qi, bKey, true);
    bonusAdded++;
  });

  updateReviewUI();
}

function removeWrong(key) {
  wrongList = wrongList.filter(w => w.key !== key);
  const item = document.getElementById('ri-' + key);
  if (item) {
    item.classList.add('cleared');
    const status = item.querySelector('.ri-status');
    if (status) status.textContent = '✅ 正解！苦手リストから削除されました';
    setTimeout(() => { if (item.parentNode) item.remove(); updateReviewUI(); }, 1800);
  } else {
    updateReviewUI();
  }
}

function updateReviewUI() {
  const badge = document.getElementById('review-count-badge');
  const shuffleBtn = document.getElementById('shuffle-btn');
  const placeholder = document.getElementById('review-placeholder');
  const count = wrongList.length;
  if (count > 0) {
    badge.style.display = 'inline';
    badge.textContent = count + '問';
    shuffleBtn.style.display = 'block';
    if (placeholder) placeholder.style.display = 'none';
  } else {
    badge.style.display = 'none';
    shuffleBtn.style.display = 'none';
    const reviewList = document.getElementById('review-list');
    if (reviewList && reviewList.querySelectorAll('.review-item:not(.cleared)').length === 0) {
      if (!document.getElementById('review-placeholder')) {
        reviewList.innerHTML = '<div class="review-placeholder" id="review-placeholder"><p>✏️ 不正解になった問題がここに自動追加されます</p><p>繰り返し練習して苦手を克服しましょう！</p></div>';
      }
    }
  }
}

function renderReviewItem(secId, pIdx, qIdx, key, isBonus) {
  const placeholder = document.getElementById('review-placeholder');
  if (placeholder) placeholder.style.display = 'none';

  const reviewList = document.getElementById('review-list');
  const sec = quizData[secId];
  const phrase = sec.phrases[pIdx];
  const q = phrase.qs[qIdx];
  const rk = 'ri' + key.replace(/[-]/g, '_');

  const div = document.createElement('div');
  div.className = 'review-item' + (isBonus ? ' review-bonus' : '');
  div.id = 'ri-' + key;

  const labelColor = isBonus ? '#8b5cf6' : '#ef4444';
  const labelText = isBonus ? '📎 類似問題' : '🔴 苦手問題';

  let inner = `
    <div style="font-size:.72rem;color:${labelColor};font-weight:700;margin-bottom:8px;letter-spacing:.05em">${labelText}</div>
    <div class="phrase-header ${sec.phraseClass}" style="margin-bottom:12px">
      📌 ${phrase.phrase} <span style="font-size:.8rem;color:#64748b;font-weight:400">— ${phrase.jp}</span>
    </div>
    <div class="quiz-question" id="qq-${rk}">`;

  if (q.type === 'mc') {
    inner += `<div class="q-split"><div class="q-left"><div class="q-num">選択式</div><p>${q.q}</p><div class="quiz-choices">`;
    const riCorrectText = q.choices[q.ans];
    const riShuffled = [...q.choices].sort(() => Math.random() - 0.5);
    const riNewAns = riShuffled.indexOf(riCorrectText);
    riShuffled.forEach((c, cIdx) => {
      inner += `<button class="choice-btn" onclick="riMC('${rk}','${key}',${cIdx},${riNewAns},'${secId}',${pIdx},${qIdx})">${c}</button>`;
    });
    inner += `</div></div><div class="q-right"><div class="q-right-hint" id="hint-${rk}">📝 回答すると<br>解説が表示されます</div><div class="quiz-feedback" id="fb-${rk}"></div><div class="grammar-explain" id="ge-${rk}"></div></div></div>`;
  } else if (q.type === 'fill') {
    inner += `<div class="q-split"><div class="q-left"><div class="q-num">穴埋め式（フレーズを入力）</div><p>${q.q}</p>
      <div class="fill-wrap">
        <input class="fill-input" id="fi-${rk}" type="text" placeholder="英語フレーズを入力..." onkeydown="if(event.key==='Enter')riFill('${rk}','${key}','${escapeAns(q.ans)}','${secId}',${pIdx},${qIdx})">
        <button class="check-btn" onclick="riFill('${rk}','${key}','${escapeAns(q.ans)}','${secId}',${pIdx},${qIdx})">確認</button>
      </div></div><div class="q-right"><div class="q-right-hint" id="hint-${rk}">📝 回答すると<br>解説が表示されます</div><div class="quiz-feedback" id="fb-${rk}"></div><div class="grammar-explain" id="ge-${rk}"></div></div></div>`;
  } else if (q.type === 'trans') {
    inner += `<div class="q-split"><div class="q-left"><div class="q-num">日→英 翻訳</div>
      <p>🇯🇵 「${q.jp}」を英語で書いてみよう</p>
      <div class="fill-wrap">
        <input class="fill-input trans-input" id="fi-${rk}" type="text" placeholder="英語で答えてください..." onkeydown="if(event.key==='Enter')riTrans('${rk}','${key}','${escapeAns(q.en)}','${secId}',${pIdx},${qIdx})">
        <button class="check-btn" onclick="riTrans('${rk}','${key}','${escapeAns(q.en)}','${secId}',${pIdx},${qIdx})">確認</button>
      </div></div><div class="q-right"><div class="q-right-hint" id="hint-${rk}">📝 回答すると<br>解説が表示されます</div><div class="quiz-feedback" id="fb-${rk}"></div><div class="grammar-explain" id="ge-${rk}"></div></div></div>`;
  }

  inner += `</div><div class="ri-status" style="margin-top:6px;font-size:.85rem;color:#065f46;font-weight:600"></div>`;
  div.innerHTML = inner;
  reviewList.appendChild(div);
}

function riTrans(rk, origKey, correctEn, secId, pIdx, qIdx) {
  const input = document.getElementById('fi-' + rk);
  if (!input || input.disabled) return;
  const normalize = s => s.toLowerCase().replace(/[.,!?'"']/g, '').replace(/\s+/g, ' ').trim();
  const isCorrect = normalize(input.value) === normalize(correctEn);
  const fb = document.getElementById('fb-' + rk);
  input.disabled = true;
  if (isCorrect) {
    input.classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！ 🇬🇧 ' + correctEn;
    removeWrong(origKey);
  } else {
    input.classList.add('wrong');
    fb.className = 'quiz-feedback show ng';
    fb.textContent = `❌ 不正解。正解: ${correctEn}`;
  }
  showGrammarBox('ge-' + rk, secId, pIdx);
}

function shuffleReview() {
  const list = document.getElementById('review-list');
  const items = Array.from(list.querySelectorAll('.review-item:not(.cleared)'));
  items.sort(() => Math.random() - 0.5);
  items.forEach(item => {
    list.appendChild(item);
    // reset buttons/inputs for re-answering
    item.querySelectorAll('.choice-btn').forEach(b => {
      b.disabled = false;
      b.classList.remove('correct','wrong');
    });
    item.querySelectorAll('.fill-input').forEach(inp => {
      inp.disabled = false;
      inp.value = '';
      inp.classList.remove('correct','wrong');
    });
    item.querySelectorAll('.quiz-feedback').forEach(fb => {
      fb.className = 'quiz-feedback';
      fb.textContent = '';
    });
    const status = item.querySelector('.ri-status');
    if (status) status.textContent = '';
    item.querySelectorAll('.grammar-explain').forEach(ge => { ge.innerHTML = ''; });
    item.querySelectorAll('.q-right-hint').forEach(h => { h.style.display = ''; });
  });
}

function riMC(rk, origKey, chosen, correct, secId, pIdx, qIdx) {
  const btns = document.querySelectorAll(`#qq-${rk} .choice-btn`);
  if (btns.length && btns[0].disabled) return;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  const fb = document.getElementById('fb-' + rk);
  const q = quizData[secId].phrases[pIdx].qs[qIdx];
  if (chosen === correct) {
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！ ' + (q.ok || '');
    removeWrong(origKey);
  } else {
    fb.className = 'quiz-feedback show ng';
    fb.textContent = '❌ 不正解。正解: ' + btns[correct].textContent + '　' + (q.ok || '');
  }
  showGrammarBox('ge-' + rk, secId, pIdx);
}

function riFill(rk, origKey, correctAns, secId, pIdx, qIdx) {
  const input = document.getElementById('fi-' + rk);
  if (!input || input.disabled) return;
  const val = input.value.trim().toLowerCase();
  const correct = correctAns.trim().toLowerCase();
  const fb = document.getElementById('fb-' + rk);
  const normalize = s => s.replace(/[.,!?']/g, '').trim();
  const isCorrect = normalize(val) === normalize(correct);
  input.disabled = true;
  if (isCorrect) {
    input.classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！　正解例: ' + correctAns;
    removeWrong(origKey);
  } else {
    input.classList.add('wrong');
    fb.className = 'quiz-feedback show ng';
    fb.textContent = `❌ 不正解。正解: ${correctAns}`;
  }
  showGrammarBox('ge-' + rk, secId, pIdx);
}

function escapeAns(s) {
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function checkTrans(qKey, secId) {
  if (answered[qKey]) return;
  const input = document.getElementById('fi-' + qKey);
  const parts = qKey.split('-');
  const pIdx = +parts[1], qIdx = +parts[2];
  const q = quizData[secId].phrases[pIdx].qs[qIdx];
  const fb = document.getElementById('fb-' + qKey);
  const normalize = s => s.toLowerCase().replace(/[.,!?'"']/g, '').replace(/\s+/g, ' ').trim();
  const isCorrect = normalize(input.value) === normalize(q.en);
  answered[qKey] = true;
  input.disabled = true;
  if (isCorrect) {
    input.classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！ 🇬🇧 ' + q.en;
    addScore(true, secId);
  } else {
    input.classList.add('wrong');
    fb.className = 'quiz-feedback show ng';
    fb.textContent = `❌ 不正解。正解: ${q.en}`;
    addScore(false, secId);
    addWrong(secId, pIdx, qIdx);
  }
  showGrammarBox('ge-' + qKey, secId, pIdx);
}

// ===================== GRAMMAR HELPERS =====================
function getGrammarType(okText) {
  if (!okText) return 'フレーズ表現';
  if (okText.includes('仮定法')) return '仮定法';
  if (okText.includes('動名詞')) return '動名詞型（〜ing）';
  if (okText.includes('過去分詞') && (okText.includes('have') || okText.includes('完了'))) return '現在完了形';
  if (okText.includes('過去分詞')) return '過去分詞';
  if (okText.includes('過去の習慣')) return '過去の習慣（used to）';
  if (okText.includes('後悔') || okText.includes('反省')) return '後悔・反省表現（should have）';
  if (okText.includes('不定詞') || okText.includes('動詞の原形')) return '不定詞型（to ＋ 動詞の原形）';
  if (okText.includes('カジュアル')) return 'カジュアル表現';
  if (okText.includes('丁寧')) return '丁寧表現（フォーマル）';
  if (okText.includes('助動詞')) return '助動詞を使う表現';
  if (okText.includes('間接疑問')) return '間接疑問文';
  if (okText.includes('命令文')) return '命令文';
  if (okText.includes('形容詞')) return '形容詞を使う表現';
  if (okText.includes('名詞')) return '名詞を使う表現';
  if (okText.includes('前置詞')) return '前置詞を使う表現';
  if (okText.includes('否定')) return '否定表現';
  return 'フレーズ表現';
}

function showGrammarBox(geId, secId, pIdx) {
  const el = document.getElementById(geId);
  if (!el) return;
  const phrase = quizData[secId].phrases[pIdx];
  const mcOk = phrase.qs[0].ok || '';
  const grammarType = getGrammarType(mcOk);
  el.innerHTML = `<div class="grammar-box">
    <div class="grammar-header">
      <span class="grammar-type-badge">📚 文法の型</span>
      <span class="grammar-type-name">${grammarType}</span>
    </div>
    <div class="grammar-phrase">🔑 ${phrase.phrase} &nbsp;<span style="color:#64748b;font-size:.8rem;font-weight:400">（${phrase.jp}）</span></div>
    <div class="grammar-detail-text">💡 ${mcOk}</div>
  </div>`;
  // ヒントプレースホルダーを非表示
  const hintId = geId.replace('ge-', 'hint-');
  const hint = document.getElementById(hintId);
  if (hint) hint.style.display = 'none';
}

// ===================== ANSWER HANDLERS =====================
function answerMC(qKey, chosen, correct, secId) {
  if (answered[qKey]) return;
  answered[qKey] = true;

  const btns = document.querySelectorAll(`#qq-${qKey} .choice-btn`);
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });

  const fb = document.getElementById('fb-' + qKey);
  const parts = qKey.split('-');
  const pIdx = +parts[1], qIdx = +parts[2];
  const q = quizData[secId].phrases[pIdx].qs[qIdx];

  if (chosen === correct) {
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！ ' + (q.ok || '');
    addScore(true, secId);
  } else {
    fb.className = 'quiz-feedback show ng';
    fb.textContent = '❌ 不正解。正解: ' + btns[correct].textContent + '　' + (q.ok || '');
    addScore(false, secId);
    addWrong(secId, pIdx, qIdx);
  }
  showGrammarBox('ge-' + qKey, secId, pIdx);
}

function checkFill(qKey, correctAns, secId) {
  if (answered[qKey]) return;

  const input = document.getElementById('fi-' + qKey);
  const val = input.value.trim().toLowerCase();
  const correct = correctAns.trim().toLowerCase();
  const fb = document.getElementById('fb-' + qKey);

  const normalize = s => s.replace(/[.,!?']/g, '').trim();
  const isCorrect = normalize(val) === normalize(correct);

  answered[qKey] = true;
  input.disabled = true;

  const parts = qKey.split('-');
  const pIdx = +parts[1], qIdx = +parts[2];

  if (isCorrect) {
    input.classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！　正解例: ' + correctAns;
    addScore(true, secId);
  } else {
    input.classList.add('wrong');
    fb.className = 'quiz-feedback show ng';
    fb.textContent = `❌ 不正解。正解: ${correctAns}`;
    addScore(false, secId);
    addWrong(secId, pIdx, qIdx);
  }
  showGrammarBox('ge-' + qKey, secId, pIdx);
}

function showTrans(qKey) {
  document.getElementById('ta-' + qKey).classList.add('show');
}

// ===================== SCORE =====================
function addScore(correct, secId) {
  totalAnswered++;
  if (correct) totalCorrect++;
  updateProgress();
  updateSecScore(secId);
}

function updateProgress() {
  const pct = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${totalCorrect} / ${totalAnswered} 正解`;
}

function updateSecScore(secId) {
  const sec = quizData[secId];
  let secCorrect = 0, secTotal = 0;
  sec.phrases.forEach((p, pIdx) => {
    p.qs.forEach((q, qIdx) => {
      const k = `${secId}-${pIdx}-${qIdx}`;
      if (answered[k]) {
        secTotal++;
        const fb = document.getElementById('fb-' + k);
        if (fb && fb.classList.contains('ok')) secCorrect++;
      }
    });
  });
  const el = document.getElementById('score-' + secId);
  if (el) el.textContent = `このセクションの正解: ${secCorrect} / ${secTotal}`;
}

// ===================== NAV =====================
function showSec(secId, btn) {
  document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + secId).classList.add('active');
  btn.classList.add('active');

    if (!c.dataset.built) { buildShuffleSection(); c.dataset.built = '1'; }

    buildSection(secId);
  }
}

// ===================== SHUFFLE MODE =====================
let shuffleQuestions = [];
let shuffleAnswered = {};
let shuffleCorrect = 0;

function getAllShuffleQuestions() {
  const all = [];
  Object.keys(quizData).forEach(secId => {
    const sec = quizData[secId];
    sec.phrases.forEach((phrase, pIdx) => {
      phrase.qs.forEach((q, qIdx) => {
        let jp, en;
        if (q.type === 'trans') {
          jp = q.jp;
          en = q.en;
        } else if (q.type === 'fill') {
          const m = q.q.match(/「([^」]+)」/);
          jp = m ? m[1] : phrase.jp;
          en = q.ok;
        } else if (q.type === 'mc') {
          const m = q.q.match(/「([^」]+)」/);
          jp = m ? m[1] : phrase.jp;
          const arrowIdx = q.q.indexOf('→');
          if (arrowIdx >= 0) {
            en = q.q.slice(arrowIdx + 2).trim().replace('_____', q.choices[q.ans]).trim();
          } else {
            en = q.choices[q.ans];
          }
        }
        all.push({
          jp, en,
          phrase: phrase.phrase,
          phraseJp: phrase.jp,
          secId, pIdx, qIdx,
          origType: q.type,
          key: 'sh_' + secId + '_' + pIdx + '_' + qIdx
        });
      });
    });
  });
  return all;
}

function buildShuffleSection() {
  shuffleQuestions = getAllShuffleQuestions();
  shuffleQuestions.sort(() => Math.random() - 0.5);
  shuffleAnswered = {};
  shuffleCorrect = 0;
  const total = shuffleQuestions.length;
  const container = document.getElementById('section-shuffle');

  let html = `<div class="shuffle-header">
    <div class="shuffle-meta">
      <span class="shuffle-count-label">🔀 シャッフルモード — 全${total}問（日本語→英語）</span>
      <span class="shuffle-progress-label" id="sh-progress">0 / ${total} 回答済み &nbsp;|&nbsp; 正解 0</span>
    </div>
    <button class="shuffle-all-btn" onclick="reshuffleAll()">🔀 シャッフルしてやり直す</button>
  </div>`;

  shuffleQuestions.forEach((sq, idx) => {
    html += `<div class="shuffle-item" id="si-${sq.key}">
      <div class="shuffle-phrase-tag">📌 ${sq.phrase} — ${sq.phraseJp}</div>
      <div class="q-split">
        <div class="q-left">
          <div class="shuffle-q-num">Q${idx + 1} ｜ 日→英 翻訳</div>
          <p class="shuffle-jp">🇯🇵 「${sq.jp}」を英語で書いてみよう</p>
          <div class="fill-wrap">
            <input class="fill-input trans-input" id="sfi-${sq.key}" type="text" placeholder="英語で答えてください..." onkeydown="if(event.key==='Enter')checkShuffleAnswer('${sq.key}')">
            <button class="check-btn" onclick="checkShuffleAnswer('${sq.key}')">確認</button>
          </div>
        </div>
        <div class="q-right">
          <div class="q-right-hint" id="sh-hint-${sq.key}">📝 回答すると<br>正解・解説が表示されます</div>
          <div class="quiz-feedback" id="sfb-${sq.key}"></div>
          <div id="sh-ans-${sq.key}"></div>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function checkShuffleAnswer(key) {
  if (shuffleAnswered[key]) return;
  const sq = shuffleQuestions.find(q => q.key === key);
  if (!sq) return;
  const input = document.getElementById('sfi-' + key);
  const fb = document.getElementById('sfb-' + key);
  const hint = document.getElementById('sh-hint-' + key);
  const ansBox = document.getElementById('sh-ans-' + key);
  if (!input || input.disabled) return;
  const normalize = s => s.toLowerCase().replace(/[.,!?'"']/g, '').replace(/\s+/g, ' ').trim();
  const isCorrect = normalize(input.value) === normalize(sq.en);
  shuffleAnswered[key] = true;
  input.disabled = true;
  if (hint) hint.style.display = 'none';
  const item = document.getElementById('si-' + key);
  if (isCorrect) {
    input.classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 正解！';
    shuffleCorrect++;
    if (item) item.classList.add('si-correct');
  } else {
    input.classList.add('wrong');
    fb.className = 'quiz-feedback show ng';
    fb.textContent = '❌ 不正解';
    if (item) item.classList.add('si-wrong');
  }
  if (ansBox) {
    ansBox.innerHTML = `<div class="grammar-box" style="margin-top:8px">
      <div class="grammar-header">
        <span class="grammar-type-badge" style="background:#6366f1">🇬🇧 正解</span>
        <span class="grammar-type-name">${sq.phrase}</span>
      </div>
      <div class="grammar-phrase">${sq.en}</div>
      <div class="grammar-detail-text">💡 ${sq.phraseJp}</div>
    </div>`;
  }
  const total = shuffleQuestions.length;
  const done = Object.keys(shuffleAnswered).length;
  const prog = document.getElementById('sh-progress');
  if (prog) prog.textContent = `${done} / ${total} 回答済み　|　正解 ${shuffleCorrect}`;
}

function reshuffleAll() {
  const c = document.getElementById('section-shuffle');
  c.dataset.built = '';
  buildShuffleSection();
  c.dataset.built = '1';
}

// Build first section on load
buildSection('s1');
</script>
