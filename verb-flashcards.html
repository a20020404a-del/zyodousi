<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基本動詞50 - 現在形・過去形・過去完了形</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Inter',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}

/* ─── Header ─── */
header{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;padding:24px;text-align:center}
header h1{font-size:1.9rem;font-weight:700;letter-spacing:.04em}
header p{font-size:.9rem;color:#94a3b8;margin-top:6px}

/* ─── Controls ─── */
.controls{background:#fff;padding:16px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:2px solid #e2e8f0;border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:border .2s}
.search-box input:focus{border-color:#3b82f6}
.search-box::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.9rem}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:8px 16px;border-radius:20px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:#94a3b8}
.filter-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.filter-btn.ir{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
.filter-btn.re{background:#10b981;border-color:#10b981;color:#fff}
.speak-all-btn{padding:9px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;cursor:pointer;font-size:.85rem;font-weight:700;font-family:inherit;transition:all .2s;white-space:nowrap}
.speak-all-btn:hover{opacity:.9;transform:scale(1.02)}

/* ─── Stats ─── */
.stats-bar{background:#1e293b;color:#94a3b8;padding:8px 24px;display:flex;gap:20px;font-size:.8rem}
.stats-bar span b{color:#fff}

/* ─── Grid ─── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding:24px;max-width:1400px;margin:0 auto}

/* ─── Verb Card ─── */
.verb-card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;transition:transform .2s,box-shadow .2s;border-top:4px solid #3b82f6}
.verb-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.verb-card.irregular{border-top-color:#8b5cf6}
.verb-card.regular{border-top-color:#10b981}

.card-header{padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.verb-num{font-size:.72rem;color:#94a3b8;font-weight:700;background:#f1f5f9;padding:3px 8px;border-radius:20px;min-width:40px;text-align:center}
.verb-main{flex:1}
.verb-en{font-size:1.5rem;font-weight:700;color:#0f172a;line-height:1}
.verb-jp{font-size:.82rem;color:#64748b;margin-top:3px}
.verb-type{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.type-ir{background:#ede9fe;color:#7c3aed}
.type-re{background:#dcfce7;color:#065f46}
.speak-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.speak-btn.btn-present{background:#dbeafe;color:#1d4ed8}
.speak-btn.btn-present:hover{background:#3b82f6;color:#fff}
.speak-btn.playing{background:#3b82f6;color:#fff;animation:pulse .6s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}

/* ─── Tense Table ─── */
.tense-table{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid #f1f5f9}
.tense-cell{padding:12px 14px;text-align:center;border-right:1px solid #f1f5f9;position:relative}
.tense-cell:last-child{border-right:none}
.tense-label{font-size:.65rem;font-weight:700;color:#94a3b8;letter-spacing:.05em;margin-bottom:6px;display:block}
.tense-form{font-size:1rem;font-weight:700;color:#0f172a;display:block;margin-bottom:4px}
.tense-form.past{color:#7c3aed}
.tense-form.pp{color:#dc2626}
.tense-sub{font-size:.7rem;color:#64748b;display:block;line-height:1.3}
.tense-speak{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;margin:6px auto 0;transition:all .2s}
.tense-speak.sp-present{background:#dbeafe;color:#2563eb}
.tense-speak.sp-past{background:#ede9fe;color:#7c3aed}
.tense-speak.sp-pp{background:#fee2e2;color:#dc2626}
.tense-speak:hover{transform:scale(1.15)}
.tense-speak.playing{animation:pulse .6s infinite alternate}

/* ─── Example ─── */
.example-area{padding:12px 20px 16px;background:#fafafa;border-top:1px solid #f1f5f9}
.example-toggle{width:100%;padding:6px 0;border:none;background:none;cursor:pointer;font-size:.78rem;color:#64748b;font-family:inherit;display:flex;align-items:center;gap:6px;font-weight:600}
.example-toggle:hover{color:#3b82f6}
.example-content{display:none;margin-top:10px}
.example-content.open{display:block}
.ex-row{margin-bottom:8px;padding:10px 12px;background:#fff;border-radius:8px;border-left:3px solid #e2e8f0;position:relative}
.ex-row.ex-present{border-left-color:#3b82f6}
.ex-row.ex-past{border-left-color:#8b5cf6}
.ex-row.ex-pp{border-left-color:#ef4444}
.ex-en{font-size:.85rem;font-weight:600;color:#0f172a;line-height:1.5}
.ex-jp{font-size:.78rem;color:#64748b;margin-top:2px}
.ex-tag{font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:10px;margin-right:6px}
.ex-tag.t-present{background:#dbeafe;color:#1d4ed8}
.ex-tag.t-past{background:#ede9fe;color:#7c3aed}
.ex-tag.t-pp{background:#fee2e2;color:#dc2626}
.ex-speak{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;border:none;background:#f1f5f9;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ex-speak:hover{background:#3b82f6;color:#fff}

/* ─── No results ─── */
.no-results{display:none;grid-column:1/-1;text-align:center;padding:80px 24px;color:#94a3b8}
.no-results.show{display:block}
.no-results p{font-size:1.1rem}

/* ─── Footer ─── */
footer{text-align:center;padding:32px;color:#94a3b8;font-size:.82rem}

/* ─── Responsive ─── */
@media(max-width:600px){
  header h1{font-size:1.4rem}
  .grid{grid-template-columns:1fr;padding:16px}
  .tense-cell{padding:10px 8px}
  .tense-form{font-size:.9rem}
}
</style>
</head>
<body>

<header>
  <h1>📚 基本動詞50 - 3つの形を覚えよう</h1>
  <p>現在形 → 過去形 → 過去完了形 ｜ 🔊 ボタンで音声再生</p>
</header>

<div class="controls">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="動詞を検索... (例: go, 行く)" oninput="filterVerbs()">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて (50)</button>
    <button class="filter-btn" onclick="setFilter('irregular',this)">不規則変化</button>
    <button class="filter-btn" onclick="setFilter('regular',this)">規則変化</button>
  </div>
  <button class="speak-all-btn" onclick="speakAll()">🔊 全部まとめて再生</button>
</div>

<div class="stats-bar">
  <span>表示中: <b id="countDisplay">50</b> 動詞</span>
  <span>不規則変化: <b>43</b> ｜ 規則変化: <b>7</b></span>
  <span>💡 各動詞の 🔊 で音声を聞けます</span>
</div>

<div class="grid" id="verbGrid"></div>

<footer>🌸 Miyabi Framework - 英語基本動詞50マスター</footer>

let currentFilter = 'all';
let speakAllTimer = null;

function speak(text, rate=0.85, pitch=1){
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate; u.pitch = pitch;
  const voices = window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(voices.length) u.voice = voices.find(v=>v.lang==='en-US')||voices[0];
  window.speechSynthesis.speak(u);
  return u;
}

function highlightBtn(btn){
  btn.classList.add('playing');
  setTimeout(()=>btn.classList.remove('playing'), 1200);
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active','ir','re'));
  btn.classList.add('active');
  if(f==='irregular') btn.classList.add('ir');
  if(f==='regular') btn.classList.add('re');
  renderCards();
}

function filterVerbs(){
  renderCards();
}

function getFilteredVerbs(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return verbs.filter(v=>{
    const matchFilter = currentFilter==='all' || v.type===currentFilter;
    const matchSearch = !q || v.en.toLowerCase().includes(q) || v.jp.includes(q);
    return matchFilter && matchSearch;
  });
}

function renderCards(){
  const list = getFilteredVerbs();
  const grid = document.getElementById('verbGrid');
  document.getElementById('countDisplay').textContent = list.length;
  grid.innerHTML = '';
  if(!list.length){
    grid.innerHTML = '<div class="no-results show"><p>🔍 見つかりません。別のキーワードで検索してください。</p></div>';
    return;
  }
  list.forEach(v=>{
    const card = document.createElement('div');
    card.className = `verb-card ${v.type}`;
    card.dataset.id = v.num;
    const typeLabel = v.type==='irregular' ? '不規則変化' : '規則変化';
    const typeCls = v.type==='irregular' ? 'type-ir' : 'type-re';
    card.innerHTML = `
      <div class="card-header">
        <span class="verb-num">#${String(v.num).padStart(2,'0')}</span>
        <div class="verb-main">
          <div class="verb-en">${v.en}</div>
          <div class="verb-jp">${v.jp}</div>
        </div>
        <span class="verb-type ${typeCls}">${typeLabel}</span>
        <button class="speak-btn btn-present" onclick="speak('${v.en}');highlightBtn(this)" title="動詞を読む">🔊</button>
      </div>
      <div class="tense-table">
        <div class="tense-cell">
          <span class="tense-label">現在形</span>
          <span class="tense-form">${v.present}</span>
          <span class="tense-sub">${v.presentSub}</span>
          <button class="tense-speak sp-present" onclick="speak('${v.present.replace(/\//g,' or ')}');highlightBtn(this)" title="現在形を読む">🔊</button>
        </div>
        <div class="tense-cell">
          <span class="tense-label">過去形</span>
          <span class="tense-form past">${v.past}</span>
          <span class="tense-sub">${v.pastSub}</span>
          <button class="tense-speak sp-past" onclick="speak('${v.past}');highlightBtn(this)" title="過去形を読む">🔊</button>
        </div>
        <div class="tense-cell">
          <span class="tense-label">過去完了形</span>
          <span class="tense-form pp">${v.pp}</span>
          <span class="tense-sub">${v.ppSub}</span>
          <button class="tense-speak sp-pp" onclick="speak('${v.pp}');highlightBtn(this)" title="過去分詞を読む">🔊</button>
        </div>
      </div>
      <div class="example-area">
        <button class="example-toggle" onclick="toggleEx(this)">
          <span>💬</span> 例文を見る
        </button>
        <div class="example-content">
          <div class="ex-row ex-present">
            <span class="ex-tag t-present">現在形</span>
            <div class="ex-en">${v.exPresent.en}</div>
            <div class="ex-jp">${v.exPresent.jp}</div>
            <button class="ex-speak" onclick="speak('${v.exPresent.en}',0.8);highlightBtn(this)">🔊</button>
          </div>
          <div class="ex-row ex-past">
            <span class="ex-tag t-past">過去形</span>
            <div class="ex-en">${v.exPast.en}</div>
            <div class="ex-jp">${v.exPast.jp}</div>
            <button class="ex-speak" onclick="speak('${v.exPast.en}',0.8);highlightBtn(this)">🔊</button>
          </div>
          <div class="ex-row ex-pp">
            <span class="ex-tag t-pp">過去完了形</span>
            <div class="ex-en">${v.exPp.en}</div>
            <div class="ex-jp">${v.exPp.jp}</div>
            <button class="ex-speak" onclick="speak('${v.exPp.en}',0.8);highlightBtn(this)">🔊</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleEx(btn){
  const content = btn.nextElementSibling;
  const isOpen = content.classList.toggle('open');
  btn.querySelector('span:last-child') && (btn.innerHTML = (isOpen ? '<span>💬</span> 例文を隠す' : '<span>💬</span> 例文を見る'));
  btn.innerHTML = `<span>💬</span> ${isOpen ? '例文を隠す' : '例文を見る'}`;
}

async function speakAll(){
  window.speechSynthesis.cancel();
  const list = getFilteredVerbs();
  const btn = document.querySelector('.speak-all-btn');
  btn.textContent = '⏹ 停止';
  btn.onclick = ()=>{ window.speechSynthesis.cancel(); btn.textContent='🔊 全部まとめて再生'; btn.onclick=speakAll; };

  for(let i=0;i<list.length;i++){
    const v = list[i];
    await speakWithPause(`Number ${v.num}. ${v.en}.`, 0.85);
    await speakWithPause(`Past: ${v.past}.`, 0.8);
    await speakWithPause(`Past participle: ${v.pp}.`, 0.8);
    await delay(400);
  }
  btn.textContent = '🔊 全部まとめて再生';
  btn.onclick = speakAll;
}

function speakWithPause(text, rate){
  return new Promise(res=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=rate;
    const voices = window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
    if(voices.length) u.voice = voices.find(v=>v.lang==='en-US')||voices[0];
    u.onend = ()=>setTimeout(res, 200);
    u.onerror = res;
    window.speechSynthesis.speak(u);
  });
}
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

window.speechSynthesis.onvoiceschanged = ()=>{};
renderCards();
</script>
