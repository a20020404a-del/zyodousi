<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 関係詞チャレンジ！日本語→英語クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --s1:#3b82f6;--s1l:#eff6ff;--s1m:#bfdbfe;
  --s2:#10b981;--s2l:#f0fdf4;--s2m:#a7f3d0;
  --s3:#8b5cf6;--s3l:#f5f3ff;--s3m:#ddd6fe;
  --s4:#f59e0b;--s4l:#fffbeb;--s4m:#fde68a;
  --s5:#ef4444;--s5l:#fff1f2;--s5m:#fecaca;
  --s6:#0891b2;--s6l:#ecfeff;--s6m:#a5f3fc;
  --s7:#ec4899;--s7l:#fdf2f8;--s7m:#f9a8d4;
}
body{font-family:'Noto Sans JP',sans-serif;background:#fef9f0;color:#1e293b;min-height:100vh}

/* ========== HEADER ========== */
header{
  background:linear-gradient(135deg,#667eea 0%,#764ba2 40%,#f093fb 100%);
  padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden
}
header::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header-inner{position:relative;z-index:1}
.header-emoji{font-size:2.8rem;display:block;animation:bounce 2s infinite}
header h1{font-family:'Fredoka One',sans-serif;font-size:2rem;color:#fff;letter-spacing:.08em;text-shadow:0 2px 8px rgba(0,0,0,.2);margin:.2em 0 .15em}
header p{color:rgba(255,255,255,.88);font-size:.9rem;font-weight:500}
.stars-row{margin-top:10px;font-size:1.2rem;letter-spacing:4px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ========== TOTAL PROGRESS ========== */
.total-prog{background:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:3px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.prog-bar{flex:1;height:12px;background:#e2e8f0;border-radius:20px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#667eea,#f093fb);transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-label{font-size:.85rem;font-weight:700;color:#6366f1;white-space:nowrap}

/* ========== NAV TABS ========== */
.nav-wrap{background:#fff;overflow-x:auto;scrollbar-width:none;border-bottom:3px solid #e2e8f0}
.nav-wrap::-webkit-scrollbar{display:none}
.nav-tabs{display:flex;min-width:max-content;padding:0 8px}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 16px;border:none;background:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:.75rem;font-weight:700;color:#94a3b8;transition:all .25s;border-bottom:4px solid transparent;white-space:nowrap;min-width:90px}
.nav-tab .tab-icon{font-size:1.4rem;transition:transform .25s}
.nav-tab:hover .tab-icon{transform:scale(1.15)}
.nav-tab.active{color:#fff;border-radius:12px 12px 0 0;border-bottom-color:transparent}
.nav-tab[data-s="s1"].active{background:var(--s1)}
.nav-tab[data-s="s2"].active{background:var(--s2)}
.nav-tab[data-s="s3"].active{background:var(--s3)}
.nav-tab[data-s="s4"].active{background:var(--s4)}
.nav-tab[data-s="s5"].active{background:var(--s5)}
.nav-tab[data-s="s6"].active{background:var(--s6)}
.nav-tab[data-s="s7"].active{background:var(--s7)}

/* ========== SECTIONS ========== */
.section{display:none;padding:20px 16px 40px;max-width:860px;margin:0 auto}
.section.active{display:block}

/* Banner */
.sec-banner{border-radius:20px;padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.banner-illo{flex-shrink:0;width:100px;height:100px}
.banner-text{}
.banner-tag{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.7;margin-bottom:4px}
.banner-title{font-family:'Fredoka One',sans-serif;font-size:1.6rem;letter-spacing:.04em;margin-bottom:6px}
.banner-tip{font-size:.85rem;line-height:1.65;font-weight:500;background:rgba(255,255,255,.55);border-radius:10px;padding:8px 12px;display:inline-block}

/* Stars */
.sec-stars{display:flex;gap:6px;margin-bottom:20px;justify-content:center}
.sec-star{font-size:1.8rem;transition:transform .3s;filter:grayscale(1) opacity(.3)}
.sec-star.lit{filter:none;animation:starPop .4s cubic-bezier(.4,0,.2,1)}
@keyframes starPop{0%{transform:scale(0.5)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Question cards */
.q-card{background:#fff;border-radius:20px;padding:24px 28px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.q-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.q-card.done{opacity:.6}
.q-num-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;color:#fff;font-size:.8rem;font-weight:900;margin-bottom:12px}
.q-jp{font-size:1.15rem;font-weight:700;line-height:1.7;color:#1e293b;margin-bottom:16px}
.q-show-btn{border:none;cursor:pointer;padding:10px 24px;border-radius:30px;font-family:'Noto Sans JP',sans-serif;font-size:.9rem;font-weight:700;color:#fff;transition:all .25s;display:inline-flex;align-items:center;gap:6px;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.q-show-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.2)}
.q-show-btn:active{transform:scale(.97)}

/* Answer panel */
.q-answer{display:none;margin-top:16px;border-radius:14px;padding:16px 20px;animation:slideIn .3s ease}
.q-answer.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-en{font-size:1.1rem;font-weight:700;color:#1e293b;margin-bottom:10px;line-height:1.6}
.q-en .keyword{font-size:1.15rem}
.q-note{font-size:.83rem;line-height:1.75;color:#374151;border-top:1px dashed rgba(0,0,0,.12);padding-top:10px;margin-top:8px}
.q-pron{display:inline-block;font-size:.78rem;background:rgba(255,255,255,.7);border-radius:8px;padding:3px 10px;margin-bottom:8px;font-weight:600}
.q-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn-ok{padding:8px 20px;border-radius:20px;border:none;background:#10b981;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-ok:hover{background:#059669;transform:scale(1.03)}
.btn-retry{padding:8px 20px;border-radius:20px;border:2px solid #e2e8f0;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;color:#64748b;transition:all .2s}
.btn-retry:hover{background:#f8fafc}

/* Completed banner */
.sec-complete{display:none;text-align:center;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:2px solid #a7f3d0;border-radius:20px;padding:28px;margin-top:8px}
.sec-complete.show{display:block;animation:popIn .5s cubic-bezier(.4,0,.2,1)}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.sec-complete-icon{font-size:3rem;display:block;margin-bottom:10px}
.sec-complete-title{font-family:'Fredoka One',sans-serif;font-size:1.6rem;color:#059669;margin-bottom:6px}
.sec-complete-msg{color:#065f46;font-size:.9rem}

/* Confetti particles */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-p{position:absolute;width:10px;height:10px;border-radius:2px;opacity:0;animation:confettiFall 1.5s ease-in forwards}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-20px) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

/* ========== SECTION COLORS ========== */
.s1 .sec-banner{background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1e40af}
.s1 .q-num-badge{background:var(--s1)}
.s1 .q-show-btn{background:linear-gradient(135deg,#3b82f6,#6366f1)}
.s1 .q-answer{background:var(--s1l);border:1.5px solid var(--s1m)}

.s2 .sec-banner{background:linear-gradient(135deg,#dcfce7,#a7f3d0);color:#065f46}
.s2 .q-num-badge{background:var(--s2)}
.s2 .q-show-btn{background:linear-gradient(135deg,#10b981,#059669)}
.s2 .q-answer{background:var(--s2l);border:1.5px solid var(--s2m)}

.s3 .sec-banner{background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#4c1d95}
.s3 .q-num-badge{background:var(--s3)}
.s3 .q-show-btn{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.s3 .q-answer{background:var(--s3l);border:1.5px solid var(--s3m)}

.s4 .sec-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#78350f}
.s4 .q-num-badge{background:var(--s4)}
.s4 .q-show-btn{background:linear-gradient(135deg,#f59e0b,#d97706)}
.s4 .q-answer{background:var(--s4l);border:1.5px solid var(--s4m)}

.s5 .sec-banner{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#7f1d1d}
.s5 .q-num-badge{background:var(--s5)}
.s5 .q-show-btn{background:linear-gradient(135deg,#ef4444,#dc2626)}
.s5 .q-answer{background:var(--s5l);border:1.5px solid var(--s5m)}

.s6 .sec-banner{background:linear-gradient(135deg,#cffafe,#a5f3fc);color:#164e63}
.s6 .q-num-badge{background:var(--s6)}
.s6 .q-show-btn{background:linear-gradient(135deg,#0891b2,#0e7490)}
.s6 .q-answer{background:var(--s6l);border:1.5px solid var(--s6m)}

.s7 .sec-banner{background:linear-gradient(135deg,#fce7f3,#fbcfe8);color:#831843}
.s7 .q-num-badge{background:var(--s7)}
.s7 .q-show-btn{background:linear-gradient(135deg,#ec4899,#db2777)}
.s7 .q-answer{background:var(--s7l);border:1.5px solid var(--s7m)}

/* ========== RESPONSIVE ========== */
@media(max-width:600px){
  header h1{font-size:1.5rem}
  .sec-banner{flex-direction:column;text-align:center;padding:20px 16px}
  .banner-illo{width:80px;height:80px}
  .banner-title{font-size:1.3rem}
  .q-card{padding:18px 16px}
  .q-jp{font-size:1rem}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-emoji">🌟</span>
    <h1>関係詞チャレンジ！</h1>
    <p>日本語 → 英語 翻訳クイズ &nbsp;|&nbsp; 全 42 問</p>
    <div class="stars-row" id="totalStars">☆☆☆☆☆</div>
  </div>
</header>

<div class="total-prog">
  <span style="font-size:.85rem;font-weight:700;color:#64748b;white-space:nowrap">総合進捗</span>

  <span class="prog-label" id="progLabel">0 / 25</span>
</div>

<div class="nav-wrap">
  <div class="nav-tabs">
    <button class="nav-tab active" data-s="s1" onclick="showSec('s1',this)">
      <span class="tab-icon">🧑</span>who / whom
    </button>
    <button class="nav-tab" data-s="s2" onclick="showSec('s2',this)">
      <span class="tab-icon">📚</span>which / that

      <span class="tab-icon">🏠</span>whose
    </button>
    <button class="nav-tab" data-s="s4" onclick="showSec('s4',this)">
      <span class="tab-icon">📍</span>where / when
    </button>
    <button class="nav-tab" data-s="s5" onclick="showSec('s5',this)">
      <span class="tab-icon">❓</span>why
    </button>
    <button class="nav-tab" data-s="s6" onclick="showSec('s6',this)">
      <span class="tab-icon">💡</span>how
    </button>
    <button class="nav-tab" data-s="s7" onclick="showSec('s7',this)">
      <span class="tab-icon">✨</span>what
    </button>

</div>

<div id="sec-s1" class="section s1 active"></div>
<div id="sec-s2" class="section s2"></div>
<div id="sec-s3" class="section s3"></div>
<div id="sec-s4" class="section s4"></div>

<div class="confetti-wrap" id="confettiWrap"></div>

// ========== STATE ==========
const state = {};
DATA.forEach(sec => {
  state[sec.id] = sec.qs.map(() => false);
});

function getDone(secId) { return state[secId].filter(Boolean).length; }
function getTotalDone() { return DATA.reduce((s, sec) => s + getDone(sec.id), 0); }

function updateProgress() {
  const done = getTotalDone();
  const total = DATA.reduce((s, sec) => s + sec.qs.length, 0);
  const pct = Math.round(done / total * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = done + ' / ' + total; // auto-calculated
  const filledStars = Math.floor(done / total * 5);
  document.getElementById('totalStars').textContent = '★'.repeat(filledStars) + '☆'.repeat(5 - filledStars);
}

// ========== RENDER ==========
function render() {
  DATA.forEach(sec => {
    const el = document.getElementById('sec-' + sec.id);
    let html = `
      <div class="sec-banner">
        <div class="banner-illo">${sec.illo}</div>
        <div class="banner-text">
          <div class="banner-tag">${sec.tag}</div>
          <div class="banner-title">${sec.title}</div>
          <div class="banner-tip">${sec.tip}</div>
        </div>
      </div>
      <div class="sec-stars" id="stars-${sec.id}">
        ${sec.qs.map((_,i) => `<span class="sec-star${state[sec.id][i]?' lit':''}" id="star-${sec.id}-${i}">⭐</span>`).join('')}
      </div>`;
    sec.qs.forEach((q, qi) => {
      const key = sec.id + '_' + qi;
      const done = state[sec.id][qi];
      html += renderCard(q, key, qi, done, sec.id);
    });
    html += `<div class="sec-complete${getDone(sec.id) === sec.qs.length ? ' show' : ''}" id="complete-${sec.id}">
      <span class="sec-complete-icon">🎉</span>
      <div class="sec-complete-title">セクション完了！</div>
      <div class="sec-complete-msg">「${sec.title}」の問題をすべてクリアしました！すごい！</div>
    </div>`;
    el.innerHTML = html;
  });
  updateProgress();
}

function renderCard(q, key, qi, done, secId) {
  const num = qi + 1;
  return `<div class="q-card${done ? ' done' : ''}" id="card-${key}">
    <div class="q-num-badge">${num}</div>
    <div class="q-jp">「${q.jp}」</div>
    <button class="q-show-btn" id="showbtn-${key}" onclick="toggleAnswer('${key}','${secId}',${qi})" ${done ? '' : ''}>
      ${done ? '✅ 答えを確認' : '👀 答えを見る'}
    </button>
    <div class="q-answer${done ? ' show' : ''}" id="ans-${key}">
      <div class="q-pron">🔊 ${q.pron}</div>
      <div class="q-en">${q.en}</div>
      <div class="q-note">${q.note}</div>
      <div class="q-actions">
        <button class="btn-ok${done ? ' disabled' : ''}" onclick="markOk('${key}','${secId}',${qi})" ${done ? 'disabled' : ''}>✅ わかった！</button>
        <button class="btn-retry" onclick="hideAnswer('${key}')">🔁 もう一度</button>
      </div>
    </div>
  </div>`;
}

function toggleAnswer(key, secId, qi) {
  const ans = document.getElementById('ans-' + key);
  const btn = document.getElementById('showbtn-' + key);
  if (ans.classList.contains('show')) {
    ans.classList.remove('show');
    btn.textContent = '👀 答えを見る';
  } else {
    ans.classList.add('show');
    btn.innerHTML = '👆 答えを隠す';
  }
}

function hideAnswer(key) {
  const ans = document.getElementById('ans-' + key);
  const btn = document.getElementById('showbtn-' + key);
  ans.classList.remove('show');
  btn.innerHTML = '👀 答えを見る';
}

function markOk(key, secId, qi) {
  if (state[secId][qi]) return;
  state[secId][qi] = true;

  // Star animation
  const star = document.getElementById('star-' + secId + '-' + qi);
  if (star) star.classList.add('lit');

  // Update card
  const card = document.getElementById('card-' + key);
  if (card) card.classList.add('done');
  const okBtn = card?.querySelector('.btn-ok');
  if (okBtn) { okBtn.disabled = true; okBtn.classList.add('disabled'); }

  updateProgress();

  // Check section complete
  if (getDone(secId) === DATA.find(s => s.id === secId).qs.length) {
    const comp = document.getElementById('complete-' + secId);
    if (comp && !comp.classList.contains('show')) {
      comp.classList.add('show');
      launchConfetti();
    }
  }
}

// ========== NAV ==========
function showSec(sid, tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + sid).classList.add('active');
  tab.classList.add('active');
}

// ========== CONFETTI ==========
const COLORS = ['#f59e0b','#ef4444','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-p';
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*-20}%;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random() > .5 ? '50%' : '2px'};
      animation-delay:${Math.random()*0.8}s;
      animation-duration:${1.2+Math.random()*0.8}s;
    `;
    wrap.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ========== INIT ==========
render();
</script>
</body>
</html>
